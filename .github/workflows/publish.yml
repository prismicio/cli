name: publish

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      MODE: production
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - run: npm publish
        if: ${{ steps.release.outputs.release_created }}

  canary:
    if: >-
      github.event_name == 'push'
      && github.repository_owner == 'prismicio'
      && needs.release.outputs.release_created != 'true'
    needs: release
    runs-on: ubuntu-latest
    env:
      MODE: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: "Deprecate previous canary"
        continue-on-error: true
        run: |
          PACKAGE_NAME=$(jq -r ".name" package.json)
          PREVIOUS_VERSION=$(npm view "$PACKAGE_NAME" dist-tags.canary 2>/dev/null || true)
          if [ -n "$PREVIOUS_VERSION" ]; then
            npm deprecate "$PACKAGE_NAME@$PREVIOUS_VERSION" "Replaced by newer canary version"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm ci
      - name: "Generate new version"
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          CURRENT_VERSION=$(jq -r '.version' package.json)
          npm version "${CURRENT_VERSION}-canary.${SHORT_SHA}" --no-git-tag-version
      - run: npm publish --tag canary

  pr-prerelease:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.repository_owner == 'prismicio'
    runs-on: ubuntu-latest
    env:
      MODE: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: "Deprecate previous PR prerelease"
        continue-on-error: true
        run: |
          PACKAGE_NAME=$(jq -r ".name" package.json)
          TAG="pr-${{ github.event.number }}"
          PREVIOUS_VERSION=$(npm view "$PACKAGE_NAME" dist-tags."$TAG" 2>/dev/null || true)
          if [ -n "$PREVIOUS_VERSION" ]; then
            npm deprecate "$PACKAGE_NAME@$PREVIOUS_VERSION" "Replaced by newer prerelease version"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm ci
      - name: "Generate new version"
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          CURRENT_VERSION=$(jq -r '.version' package.json)
          npm version "${CURRENT_VERSION}-pr.${{ github.event.number }}.${SHORT_SHA}" --no-git-tag-version
      - run: npm publish --tag pr-${{ github.event.number }}

  pr-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.repository_owner == 'prismicio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: "Deprecate and remove PR prerelease"
        continue-on-error: true
        run: |
          PACKAGE_NAME=$(jq -r ".name" package.json)
          TAG="pr-${{ github.event.number }}"
          VERSION=$(npm view "$PACKAGE_NAME" dist-tags."$TAG" 2>/dev/null || echo "")
          if [ -n "$VERSION" ]; then
            npm deprecate "$PACKAGE_NAME@$VERSION" "PR ${{ github.event.number }} was closed"
            npm dist-tag rm "$PACKAGE_NAME" "$TAG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
